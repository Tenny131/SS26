<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klausurtrainer · Übersicht</title>
<style>
  :root{
    --paper:#f3f0e7;
    --ink:#16202b;
    --ink-soft:#3c4a57;
    --line:#c8c2b0;
    --line-strong:#9aa6b2;
    --blue:#1f4e6b;
    --blue-bright:#2f7fb0;
    --accent:#c2562e;
    --field:#fbfaf5;
    --shadow:0 1px 0 rgba(0,0,0,.04);
    --mono:"IBM Plex Mono",ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:var(--sans); line-height:1.55;
    background-image:
      linear-gradient(rgba(31,78,107,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(31,78,107,.045) 1px, transparent 1px);
    background-size:26px 26px;
  }
  .wrap{max-width:920px; margin:0 auto; padding:24px 18px 80px;}

  header.masthead{
    border:1.5px solid var(--ink); background:var(--field);
    padding:18px 20px; position:relative; box-shadow:var(--shadow);
  }
  header.masthead::before{
    content:""; position:absolute; inset:5px; border:1px solid var(--line-strong);
    pointer-events:none;
  }
  .eyebrow{
    font-family:var(--mono); font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--blue); margin:0 0 6px;
  }
  h1{font-size:clamp(22px,4vw,34px); margin:0; letter-spacing:-.01em; font-weight:800;}
  .sub{font-family:var(--mono); font-size:12px; color:var(--ink-soft); margin-top:8px;}
  .stat-row{display:flex; flex-wrap:wrap; gap:14px 22px; margin-top:14px; font-family:var(--mono); font-size:11.5px; color:var(--ink-soft);}
  .stat-row b{color:var(--ink); font-weight:700;}

  section.panel{margin-top:22px;}
  .panel-title{
    font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--ink-soft); margin:0 0 12px; display:flex; align-items:center; gap:10px;
  }
  .panel-title::after{content:""; flex:1; height:1px; background:var(--line);}

  .mod-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media(max-width:620px){ .mod-grid{grid-template-columns:1fr;} }

  .mod{
    display:flex; flex-direction:column; gap:0; text-decoration:none; color:inherit;
    border:1.5px solid var(--ink); background:var(--field); padding:15px 16px;
    position:relative; transition:transform .08s ease, box-shadow .12s ease;
  }
  a.mod:hover{ transform:translateY(-2px); box-shadow:4px 4px 0 var(--ink); }
  a.mod:focus-visible{ outline:3px solid var(--blue-bright); outline-offset:2px; }
  .mod .m-no{font-family:var(--mono); font-size:11px; color:var(--blue); letter-spacing:.12em; font-weight:700;}
  .mod .m-h{font-weight:800; font-size:16px; margin:4px 0 5px; line-height:1.25;}
  .mod .m-d{font-size:12.5px; color:var(--ink-soft); line-height:1.45; flex:1;}
  .mod .m-foot{
    font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; margin-top:12px;
    display:flex; align-items:center; gap:8px;
  }
  .mod .m-arrow{font-weight:700;}

  /* aktiv */
  a.mod.ready .m-foot{color:var(--blue);}
  a.mod.ready::after{
    content:""; position:absolute; top:0; right:0; width:0; height:0;
    border-style:solid; border-width:0 16px 16px 0; border-color:transparent var(--blue) transparent transparent;
  }
  /* Platzhalter */
  .mod.todo{ cursor:not-allowed; border-style:dashed; border-color:var(--line-strong); background:transparent; opacity:.78; }
  .mod.todo .m-no{color:var(--ink-soft);}
  .mod.todo .m-foot{color:var(--ink-soft);}
  .badge{
    padding:1px 7px; border:1px solid currentColor; border-radius:2px;
    font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
  }

  footer.foot{
    margin-top:30px; font-family:var(--mono); font-size:11px; color:var(--ink-soft);
    border-top:1px solid var(--line); padding-top:12px; line-height:1.6;
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <p class="eyebrow">TU Berlin · Klausurvorbereitung</p>
    <h1>Klausurtrainer — Übersicht</h1>
    <p class="sub">Frage–Antwort-Trainer für meine Module</p>
    <div class="stat-row" id="statRow"></div>
  </header>

  <section class="panel">
    <p class="panel-title">Module</p>
    <div class="mod-grid" id="modGrid"></div>
  </section>

  <footer class="foot">
    Statische Sammlung von Klausurtrainern · gehostet über GitHub Pages.<br>
    Module ohne Verlinkung sind noch in Arbeit.
  </footer>

</div>

<script>
  // Reihenfolge = Anzeige. status: 'ready' (verlinkt) oder 'todo' (Platzhalter).
  // Zum Aktivieren eines Platzhalters: status auf 'ready' setzen und 'href' eintragen.
  var MODULE = [
    { name:"Produktionstechnik 2",
      desc:"86 Fragen · 12 Themengebiete (VL1–VL12). Echte + beliebige Klausur, Einzeltraining.",
      status:"ready", href:"Klausurtrainer_PTII.html" },

    { name:"Automatisierungstechnik 1",
      desc:"Trainer in Vorbereitung.",
      status:"todo", href:"" },

    { name:"Automatisierungstechnik 2",
      desc:"Trainer in Vorbereitung.",
      status:"todo", href:"" },

    { name:"Fabrikbetrieb",
      desc:"Trainer in Vorbereitung.",
      status:"todo", href:"" },

    { name:"Grundlagen der industriellen Informationstechnik",
      desc:"Trainer in Vorbereitung.",
      status:"todo", href:"" },

    { name:"Techniken des Qualitätsmanagements",
      desc:"Trainer in Vorbereitung.",
      status:"todo", href:"" },

    { name:"Verfahren der Mikro- und Nanotechnologie",
      desc:"Trainer in Vorbereitung.",
      status:"todo", href:"" },

    { name:"Applied Machine Learning",
      desc:"Trainer in Vorbereitung.",
      status:"todo", href:"" }
  ];

  function esc(s){ return String(s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
  function pad(n){ return (n<10?'0':'')+n; }

  var grid = document.getElementById('modGrid');
  MODULE.forEach(function(m, i){
    var no = 'Modul ' + pad(i+1);
    if(m.status === 'ready' && m.href){
      var a = document.createElement('a');
      a.className = 'mod ready';
      a.href = m.href;
      a.innerHTML =
        '<span class="m-no">'+no+'</span>'+
        '<span class="m-h">'+esc(m.name)+'</span>'+
        '<span class="m-d">'+esc(m.desc)+'</span>'+
        '<span class="m-foot"><span class="badge">Bereit</span><span class="m-arrow">Trainer öffnen →</span></span>';
      grid.appendChild(a);
    } else {
      var d = document.createElement('div');
      d.className = 'mod todo';
      d.setAttribute('aria-disabled','true');
      d.innerHTML =
        '<span class="m-no">'+no+'</span>'+
        '<span class="m-h">'+esc(m.name)+'</span>'+
        '<span class="m-d">'+esc(m.desc)+'</span>'+
        '<span class="m-foot"><span class="badge">In Arbeit</span></span>';
      grid.appendChild(d);
    }
  });

  var nReady = MODULE.filter(function(m){return m.status==='ready';}).length;
  document.getElementById('statRow').innerHTML =
    '<span><b>'+MODULE.length+'</b> Module</span>'+
    '<span><b>'+nReady+'</b> verfügbar</span>'+
    '<span><b>'+(MODULE.length-nReady)+'</b> in Arbeit</span>';
</script>
</body>
</html>
